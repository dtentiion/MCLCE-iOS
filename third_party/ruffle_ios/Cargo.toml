[package]
name = "ruffle_ios"
version = "0.0.1"
edition = "2021"
description = "iOS FFI wrapper around Ruffle, consumed by the MCLCE-iOS app."
publish = false

[lib]
name = "ruffle_ios"
crate-type = ["staticlib"]

[profile.release]
opt-level = 3
lto = "thin"
panic = "abort"
strip = "symbols"

# ruffle_core brings the player, display list, AVM1/AVM2, and shape
# tessellation. We keep ruffle_render pulled in explicitly so the
# RenderBackend trait is in scope at the top level.
#
# Both come from upstream master until we know a commit that builds clean
# for iOS, then we pin. Expect the first CI build to take 10-20 minutes as
# the full dep tree compiles.
[dependencies]
swf = "0.2"
ruffle_render = { git = "https://github.com/ruffle-rs/ruffle", branch = "master" }
ruffle_core   = { git = "https://github.com/ruffle-rs/ruffle", branch = "master" }
