[package]
name = "ruffle_ios"
version = "0.0.1"
edition = "2021"
description = "iOS FFI wrapper around Ruffle, consumed by the MCLCE-iOS app."
publish = false

[lib]
name = "ruffle_ios"
crate-type = ["staticlib"]

[profile.release]
opt-level = 3
lto = "thin"
panic = "abort"
strip = "symbols"

# ruffle_render brings the RenderBackend trait we need to implement for
# Metal. Starting with this smaller crate first; we add ruffle_core (the
# full player) once the trait compiles cleanly on iOS.
#
# Pulled from upstream master until we know what commits actually build for
# us; pin a revision in a follow-up once green.
[dependencies]
swf = "0.2"
ruffle_render = { git = "https://github.com/ruffle-rs/ruffle", branch = "master" }
