[package]
name = "ruffle_ios"
version = "0.0.1"
edition = "2021"
description = "iOS FFI wrapper around Ruffle, consumed by the MCLCE-iOS app."
publish = false

[lib]
name = "ruffle_ios"
crate-type = ["staticlib"]

[profile.release]
opt-level = 3
lto = "thin"
panic = "abort"
strip = "symbols"

# Start with ruffle's standalone `swf` parser crate. It's a leaf dep with a
# small dependency tree, so the first cross-compile pass stays fast while
# we validate the toolchain end-to-end. Once this compiles clean on iOS
# ARM64 we grow the tree to pull in ruffle_render_common + the AVM.
[dependencies]
swf = "0.2"
