[package]
name = "ruffle_ios"
version = "0.0.1"
edition = "2021"
description = "iOS FFI wrapper around Ruffle, consumed by the MCLCE-iOS app."
publish = false

[lib]
name = "ruffle_ios"
crate-type = ["staticlib"]

[profile.release]
opt-level = 3
lto = "thin"
panic = "abort"
strip = "symbols"

# ruffle_core brings the player, display list, AVM1/AVM2, and shape
# tessellation. We keep ruffle_render pulled in explicitly so the
# RenderBackend trait is in scope at the top level.
#
# Both come from upstream master until we know a commit that builds clean
# for iOS, then we pin. Expect the first CI build to take 10-20 minutes as
# the full dep tree compiles.
[dependencies]
swf                 = { git = "https://github.com/dtentiion/ruffle", rev = "317161db" }
ruffle_render       = { git = "https://github.com/dtentiion/ruffle", rev = "317161db" }
ruffle_core         = { git = "https://github.com/dtentiion/ruffle", rev = "317161db" }
ruffle_common       = { git = "https://github.com/dtentiion/ruffle", rev = "317161db" }
# wgpu-backed renderer. wgpu supports iOS Metal natively, so letting
# Ruffle's official wgpu backend drive the drawing is vastly simpler than
# writing our own Metal RenderBackend by hand. Brings naga + wgpu's dep
# tree (meaningful build-time hit, but much less work than a custom
# backend and far more correct).
ruffle_render_wgpu  = { git = "https://github.com/dtentiion/ruffle", rev = "317161db" }
wgpu                = "27"
raw-window-handle   = "0.6"
pollster            = "0.4"
# Subscriber that forwards Ruffle's internal tracing (stubs hit, tag
# warnings, invalid SWF bits, etc.) into our AVM_LOG ring buffer.
# `max_level_trace` + `release_max_level_trace` defeat tracing's compile-time
# level gate in release builds, which otherwise strips everything under INFO
# and hides all the AVM2 / player debug events we care about.
tracing             = { version = "0.1", features = ["max_level_trace", "release_max_level_trace"] }
tracing-subscriber  = { version = "0.3", default-features = false, features = ["std", "fmt", "env-filter"] }
