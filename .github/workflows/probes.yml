name: Port probes

# Manual-dispatch probes for the two biggest porting efforts:
#   1. world: compile upstream Minecraft.World for iOS
#   2. gameswf: compile GameSWF core for iOS
# Both expected to fail initially. Useful for seeing what needs shimming
# as Phase 1 (world) and Phase 3 (UI) progress.
#
# Runs only on manual dispatch to avoid burning CI minutes on every push.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  world:
    name: world probe (expected to fail)
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || true

      - name: Configure with world probe enabled
        run: |
          cmake -S . -B build-probe \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DENABLE_WORLD_PROBE=ON

      - name: Try to build probe target
        run: |
          cmake --build build-probe --config Release --target mcle_world_probe 2>&1 | tee probe.log || true
          echo "---"
          echo "First 50 error lines (if any):"
          grep -m 50 -E "error:" probe.log || echo "no errors captured"

      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-probe-log
          path: probe.log
          if-no-files-found: warn
          retention-days: 14

  gameswf:
    name: gameswf probe (expected to fail)
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || true

      - name: Patch vendored GameSWF for libc++
        run: |
          chmod +x scripts/patch-gameswf.sh
          ./scripts/patch-gameswf.sh

      - name: Configure with gameswf probe enabled
        run: |
          cmake -S . -B build-gs \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DENABLE_GAMESWF_PROBE=ON

      - name: Try to build gameswf probe target
        run: |
          cmake --build build-gs --config Release --target mcle_gameswf_probe 2>&1 | tee gameswf-probe.log || true
          echo "---"
          echo "First 50 error lines (if any):"
          grep -m 50 -E "error:" gameswf-probe.log || echo "no errors captured"

      - name: Upload gameswf probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gameswf-probe-log
          path: gameswf-probe.log
          if-no-files-found: warn
          retention-days: 14
