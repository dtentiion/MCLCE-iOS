name: iOS build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (arm64, unsigned)
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || true
          xcodebuild -version
          cmake --version

      - name: Install Rust toolchain + aarch64-apple-ios target
        run: |
          # rustup is preinstalled on macos-14 runners.
          rustup default stable
          rustup target add aarch64-apple-ios
          rustc --version
          cargo --version

      - name: Cache cargo registry + git DB
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('third_party/ruffle_ios/Cargo.toml', 'third_party/ruffle_ios/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Cache cargo build artifacts for aarch64-apple-ios
        uses: actions/cache@v4
        with:
          path: third_party/ruffle_ios/target
          key: cargo-target-ios-${{ hashFiles('third_party/ruffle_ios/Cargo.toml', 'third_party/ruffle_ios/Cargo.lock', 'third_party/ruffle_ios/src/**') }}
          restore-keys: |
            cargo-target-ios-

      - name: Build ruffle_ios static library for iOS ARM64
        run: |
          cd third_party/ruffle_ios
          cargo build --release --target aarch64-apple-ios
          ls -la target/aarch64-apple-ios/release/libruffle_ios.a

      - name: Patch vendored GameSWF for libc++
        run: |
          chmod +x scripts/patch-gameswf.sh
          ./scripts/patch-gameswf.sh

      - name: Configure (iOS device)
        run: |
          cmake -S . -B build \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DDEPLOYMENT_TARGET=14.0

      - name: Build (Release)
        run: |
          cmake --build build --config Release -- -quiet

      - name: Package .ipa
        id: package
        run: |
          set -euo pipefail
          APP_PATH="build/Minecraft.Client/iOS/App/Release-iphoneos/Minecraft.LCE.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            find build -name '*.app' -type d
            exit 1
          fi

          STAGE="$PWD/artifacts"
          mkdir -p "$STAGE/Payload"
          cp -R "$APP_PATH" "$STAGE/Payload/"
          ( cd "$STAGE" && zip -qr "Minecraft.LCE.ipa" Payload )

          ls -la "$STAGE"
          echo "ipa_path=$STAGE/Minecraft.LCE.ipa" >> "$GITHUB_OUTPUT"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft.LCE-ipa
          path: artifacts/Minecraft.LCE.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload .app bundle (debug, unzipped)
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Minecraft.LCE-app-bundle
          path: build/Minecraft.Client/iOS/App/Release-iphoneos/Minecraft.LCE.app
          if-no-files-found: warn
          retention-days: 7

  world-probe:
    name: world-probe (upstream gameplay TUs)
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || true
          xcodebuild -version
          cmake --version

      - name: Configure (probe target only)
        run: |
          cmake -S . -B build-probe \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DDEPLOYMENT_TARGET=14.0 \
            -DENABLE_WORLD_PROBE=ON

      - name: Build mcle_world_probe
        run: |
          cmake --build build-probe --config Release --target mcle_world_probe -- -quiet
