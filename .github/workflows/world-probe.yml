name: World probe

# Probe job for attempting to compile upstream Minecraft.World sources on iOS.
# Expected to fail for now. Useful for seeing what Windows-isms and missing
# shims need to be handled as Phase 1 progresses.
#
# Runs only on manual dispatch to avoid burning CI minutes on every push.

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: world probe (expected to fail)
    runs-on: macos-14
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || true

      - name: Configure with world probe enabled
        run: |
          cmake -S . -B build-probe \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/ios.toolchain.cmake" \
            -DPLATFORM=OS64 \
            -DENABLE_WORLD_PROBE=ON

      - name: Try to build probe target
        run: |
          cmake --build build-probe --config Release --target mcle_world_probe 2>&1 | tee probe.log || true
          echo "---"
          echo "First 50 error lines (if any):"
          grep -m 50 -E "error:" probe.log || echo "no errors captured"

      - name: Upload probe log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-probe-log
          path: probe.log
          if-no-files-found: warn
          retention-days: 14
